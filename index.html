<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>VMINawebsite's Useful stuff</title>
  
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&display=swap" rel="stylesheet">

  <style>
    /* ---------------------------------------------------
       Animations (Added so your shapes float and rotate)
       --------------------------------------------------- */
    @keyframes float {
      0%, 100% { transform: translateY(0); }
      50% { transform: translateY(-30px); }
    }
    @keyframes rotate {
      0% { transform: rotate(45deg); }
      100% { transform: rotate(405deg); }
    }

    /* ---------------------------------------------------
       Custom Tool Containers (To hold your Search & Grammar)
       --------------------------------------------------- */
    .tools-grid {
      display: flex;
      flex-direction: column;
      gap: 30px;
      width: 100%;
      max-width: 600px;
      margin: 0 auto;
    }
    .tool-box {
      background: rgba(255, 255, 255, 0.1);
      backdrop-filter: blur(12px);
      border: 1px solid rgba(255, 255, 255, 0.3);
      border-radius: 16px;
      padding: 30px;
      box-shadow: 0 8px 32px rgba(0, 0, 0, 0.1);
    }
    .tool-title {
      color: #ffffff;
      font-family: 'Inter', sans-serif;
      font-size: 1.5rem;
      font-weight: 600;
      margin-bottom: 20px;
    }
    .tool-form {
      display: flex;
      gap: 15px;
      justify-content: center;
      flex-wrap: wrap;
    }

    /* ---------------------------------------------------
       YOUR PROVIDED CSS (Exactly as you pasted it)
       --------------------------------------------------- */
    :root {
      --dl-layout-size-large: 144px;
      --dl-layout-size-small: 48px;
      --dl-layout-space-unit: 16px;
      --dl-layout-size-medium: 96px;
      --dl-layout-size-xlarge: 192px;
      --dl-layout-size-xsmall: 16px;
      --dl-color-theme-accent1: #FFFFFF;
      --dl-color-theme-accent2: #F5D1B0;
      --dl-layout-radius-round: 50%;
      --dl-layout-size-xxlarge: 288px;
      --dl-color-theme-primary1: #BF4408;
      --dl-color-theme-primary2: #E65103;
      --dl-layout-size-maxwidth: 1400px;
      --dl-layout-radius-radius2: 2px;
      --dl-layout-radius-radius4: 4px;
      --dl-layout-radius-radius8: 8px;
      --dl-layout-space-halfunit: 8px;
      --dl-layout-space-sixunits: 96px;
      --dl-layout-space-twounits: 32px;
      --dl-color-theme-secondary1: #FFFFFF;
      --dl-color-theme-secondary2: #FBF1EB;
      --dl-layout-space-fiveunits: 80px;
      --dl-layout-space-fourunits: 64px;
      --dl-layout-space-threeunits: 48px;
      --dl-color-theme-neutral-dark: #191818;
      --dl-layout-radius-cardradius: 8px;
      --dl-color-theme-neutral-light: #FBFAF9;
      --dl-layout-radius-imageradius: 8px;
      --dl-layout-radius-inputradius: 24px;
      --dl-layout-radius-buttonradius: 24px;
      --dl-layout-space-oneandhalfunits: 24px;
    }

    body {
      margin: 0;
      padding: 0;
    }

    .home-container1 {
      width: 100%;
      display: flex;
      min-height: 100vh;
      align-items: center;
      flex-direction: column;
    }

    .home-thq-hero-section-elm {
      width: 100%;
      display: flex;
      padding: 40px 20px;
      overflow: hidden;
      position: relative;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 50%, #f093fb 100%);
      min-height: 100vh;
      align-items: center;
      justify-content: center;
    }

    .home-thq-hero-content-elm {
      z-index: 10;
      position: relative;
      max-width: 800px;
      text-align: center;
      width: 100%;
    }

    .home-thq-hero-title-elm {
      color: #ffffff;
      margin: 0 0 24px 0;
      font-size: 4.5rem;
      font-family: "'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif";
      font-weight: 800;
      line-height: 1.1;
      text-shadow: 0 4px 20px rgba(0, 0, 0, 0.3);
      letter-spacing: -2px;
    }

    .home-thq-hero-description-elm {
      color: rgba(255, 255, 255, 0.95);
      margin: 0 0 40px 0;
      font-size: 1.25rem;
      max-width: 600px;
      font-family: "'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif";
      line-height: 1.6;
      margin-left: auto;
      margin-right: auto;
    }

    .home-thq-hero-geometric-elm {
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      z-index: 1;
      position: absolute;
      pointer-events: none;
    }

    .home-thq-geo-shape-elm1 {
      top: 10%;
      right: 10%;
      width: 300px;
      border: 40px solid #ffffff;
      height: 300px;
      animation: float 6s ease-in-out infinite;
      border-radius: 50%;
    }

    .home-thq-geo-shape-elm2 {
      left: 10%;
      width: 0;
      bottom: 20%;
      height: 0;
      animation: float 8s ease-in-out infinite reverse;
      border-left: 100px solid transparent;
      border-right: 100px solid transparent;
      border-bottom: 170px solid rgba(255, 255, 255, 0.3);
    }

    .home-thq-geo-shape-elm3 {
      top: 50%;
      right: 15%;
      width: 150px;
      height: 150px;
      animation: rotate 20s linear infinite;
      transform: rotate(45deg);
      background: rgba(255, 255, 255, 0.2);
    }

    .geo-shape {
      opacity: 0.15;
      position: absolute;
    }

    .hero-btn {
      cursor: pointer;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      padding: 16px 40px;
      font-size: 1.1rem;
      transition: all 0.3s ease;
      font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      font-weight: 600;
      border-radius: 50px;
      text-decoration: none;
      border: none;
    }

    .hero-btn-primary {
      color: #ffffff;
      background: linear-gradient(135deg, #ff6b6b 0%, #ee5a24 100%);
      box-shadow: 0 10px 30px rgba(238, 90, 36, 0.4);
    }

    .hero-btn-primary:hover {
      transform: translateY(-3px);
      box-shadow: 0 15px 40px rgba(238, 90, 36, 0.5);
    }

    .hero-btn-secondary {
      color: #764ba2;
      background: #ffffff;
      box-shadow: 0 10px 30px rgba(0, 0, 0, 0.15);
    }

    .hero-btn-secondary:hover {
      transform: translateY(-3px);
      box-shadow: 0 15px 40px rgba(0, 0, 0, 0.2);
    }

    .thq-input {
      color: var(--dl-color-theme-neutral-dark);
      cursor: auto;
      outline: none;
      padding: 0.5rem 1.5rem;
      align-self: stretch;
      border-color: transparent;
      border-width: 0px;
      border-radius: var(--dl-layout-radius-inputradius);
      background-color: var(--dl-color-theme-neutral-light);
      font-family: 'Inter', sans-serif;
      font-size: 1rem;
      width: 100%;
    }

    .thq-input:focus {
      outline: 2px solid #ff6b6b;
    }

    .textarea {
      color: var(--dl-color-theme-neutral-dark);
      cursor: auto;
      padding: 1rem 1.5rem;
      border-color: transparent;
      border-width: 0px;
      border-radius: var(--dl-layout-radius-cardradius);
      background-color: var(--dl-color-theme-neutral-light);
      font-family: 'Inter', sans-serif;
      font-size: 1rem;
      width: 100%;
      resize: vertical;
      min-height: 100px;
      margin-bottom: 15px;
      outline: none;
    }
    
    .textarea:focus {
      outline: 2px solid #764ba2;
    }

    @media(max-width: 767px) {
      .home-thq-hero-title-elm {
        font-size: 2.5rem;
        letter-spacing: -1px;
      }
      .home-thq-hero-description-elm {
        font-size: 1.1rem;
      }
      .home-thq-geo-shape-elm1 {
        width: 150px;
        height: 150px;
        border-width: 20px;
      }
      .home-thq-geo-shape-elm2 {
        border-left: 60px solid transparent;
        border-right: 60px solid transparent;
        border-bottom: 100px solid rgba(255, 255, 255, 0.3);
      }
      .hero-btn {
        padding: 14px 32px;
        font-size: 1rem;
      }
    }

    @media(max-width: 479px) {
      .home-thq-hero-title-elm {
        font-size: 2rem;
      }
      .hero-btn {
        width: 100%;
      }
    }
  </style>
</head>
<body>

  <div class="home-container1">
    <section class="home-thq-hero-section-elm">
      
      <div class="home-thq-hero-geometric-elm">
        <div class="home-thq-geo-shape-elm1 geo-shape"></div>
        <div class="home-thq-geo-shape-elm2 geo-shape"></div>
        <div class="home-thq-geo-shape-elm3 geo-shape"></div>
      </div>

      <div class="home-thq-hero-content-elm">
        <h1 class="home-thq-hero-title-elm">Useful Stuff</h1>
        <p class="home-thq-hero-description-elm">
          Search the web safely and correct your grammar, all in one place.
        </p>

        <div class="tools-grid">
          
          <div class="tool-box">
            <h2 class="tool-title">Kiddle Search</h2>
            <form class="tool-form" action="https://www.kiddle.co/s.php" method="GET" target="_blank">
              <input type="text" name="q" placeholder="Search the web safely..." class="thq-input" required>
              <button type="submit" class="hero-btn hero-btn-primary">Search</button>
            </form>
          </div>

          <div class="tool-box">
            <h2 class="tool-title">CorrectsX Grammar</h2>
            <div style="display: flex; flex-direction: column; align-items: center; width: 100%;">
              <textarea class="textarea" placeholder="Paste your text here to check your grammar..."></textarea>
              <a href="#" class="hero-btn hero-btn-secondary" style="width: 100%;">Check Grammar</a>
            </div>
          </div>

        </div>
        
        <div style="margin-top: 40px;">
           <a href="https://vminawebsite.github.io/" class="hero-btn hero-btn-secondary" style="background: transparent; border: 1px solid white; color: white; box-shadow: none;">← Back to Home</a>
        </div>

      </div>
    </section>
  </div>

</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>VMINawebsite's Useful stuff</title>
  
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&display=swap" rel="stylesheet">

  <style>
    /* ---------------------------------------------------
       Animations
       --------------------------------------------------- */
    @keyframes float {
      0%, 100% { transform: translateY(0); }
      50% { transform: translateY(-30px); }
    }
    @keyframes rotate {
      0% { transform: rotate(45deg); }
      100% { transform: rotate(405deg); }
    }

    /* ---------------------------------------------------
       Custom Tool Containers
       --------------------------------------------------- */
    .tools-grid {
      display: flex;
      flex-direction: column;
      gap: 30px;
      width: 100%;
      max-width: 600px;
      margin: 0 auto;
    }
    .tool-box {
      background: rgba(255, 255, 255, 0.1);
      backdrop-filter: blur(12px);
      border: 1px solid rgba(255, 255, 255, 0.3);
      border-radius: 16px;
      padding: 30px;
      box-shadow: 0 8px 32px rgba(0, 0, 0, 0.1);
    }
    .tool-title {
      color: #ffffff;
      font-family: 'Inter', sans-serif;
      font-size: 1.5rem;
      font-weight: 600;
      margin-bottom: 20px;
    }
    .tool-form {
      display: flex;
      gap: 15px;
      justify-content: center;
      flex-wrap: wrap;
    }

    /* ---------------------------------------------------
       YOUR PROVIDED CSS
       --------------------------------------------------- */
    :root {
      --dl-layout-radius-inputradius: 24px;
      --dl-layout-radius-cardradius: 8px;
    }

    body {
      margin: 0;
      padding: 0;
    }

    .home-container1 {
      width: 100%;
      display: flex;
      min-height: 100vh;
      align-items: center;
      flex-direction: column;
    }

    .home-thq-hero-section-elm {
      width: 100%;
      display: flex;
      padding: 40px 20px;
      overflow: hidden;
      position: relative;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 50%, #f093fb 100%);
      min-height: 100vh;
      align-items: center;
      justify-content: center;
    }

    .home-thq-hero-content-elm {
      z-index: 10;
      position: relative;
      max-width: 800px;
      text-align: center;
      width: 100%;
    }

    .home-thq-hero-title-elm {
      color: #ffffff;
      margin: 0 0 24px 0;
      font-size: 4.5rem;
      font-family: "'Inter', sans-serif";
      font-weight: 800;
      line-height: 1.1;
      text-shadow: 0 4px 20px rgba(0, 0, 0, 0.3);
      letter-spacing: -2px;
    }

    .home-thq-hero-description-elm {
      color: rgba(255, 255, 255, 0.95);
      margin: 0 0 40px 0;
      font-size: 1.25rem;
      max-width: 600px;
      font-family: "'Inter', sans-serif";
      line-height: 1.6;
      margin-left: auto;
      margin-right: auto;
    }

    .home-thq-hero-geometric-elm {
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      z-index: 1;
      position: absolute;
      pointer-events: none;
    }

    .home-thq-geo-shape-elm1 {
      top: 10%;
      right: 10%;
      width: 300px;
      border: 40px solid #ffffff;
      height: 300px;
      animation: float 6s ease-in-out infinite;
      border-radius: 50%;
    }

    .home-thq-geo-shape-elm2 {
      left: 10%;
      width: 0;
      bottom: 20%;
      height: 0;
      animation: float 8s ease-in-out infinite reverse;
      border-left: 100px solid transparent;
      border-right: 100px solid transparent;
      border-bottom: 170px solid rgba(255, 255, 255, 0.3);
    }

    .home-thq-geo-shape-elm3 {
      top: 50%;
      right: 15%;
      width: 150px;
      height: 150px;
      animation: rotate 20s linear infinite;
      transform: rotate(45deg);
      background: rgba(255, 255, 255, 0.2);
    }

    .geo-shape {
      opacity: 0.15;
      position: absolute;
    }

    .hero-btn {
      cursor: pointer;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      padding: 16px 40px;
      font-size: 1.1rem;
      transition: all 0.3s ease;
      font-family: 'Inter', sans-serif;
      font-weight: 600;
      border-radius: 50px;
      text-decoration: none;
      border: none;
    }

    .hero-btn-primary {
      color: #ffffff;
      background: linear-gradient(135deg, #ff6b6b 0%, #ee5a24 100%);
      box-shadow: 0 10px 30px rgba(238, 90, 36, 0.4);
    }

    .hero-btn-primary:hover {
      transform: translateY(-3px);
      box-shadow: 0 15px 40px rgba(238, 90, 36, 0.5);
    }

    .hero-btn-secondary {
      color: #764ba2;
      background: #ffffff;
      box-shadow: 0 10px 30px rgba(0, 0, 0, 0.15);
    }

    .hero-btn-secondary:hover {
      transform: translateY(-3px);
      box-shadow: 0 15px 40px rgba(0, 0, 0, 0.2);
    }

    .thq-input {
      color: #191818;
      cursor: auto;
      outline: none;
      padding: 0.5rem 1.5rem;
      align-self: stretch;
      border-color: transparent;
      border-width: 0px;
      border-radius: var(--dl-layout-radius-inputradius);
      background-color: #FBFAF9;
      font-family: 'Inter', sans-serif;
      font-size: 1rem;
      width: 100%;
    }

    .thq-input:focus {
      outline: 2px solid #ff6b6b;
    }

    .textarea {
      color: #191818;
      cursor: auto;
      padding: 1rem 1.5rem;
      border-color: transparent;
      border-width: 0px;
      border-radius: var(--dl-layout-radius-cardradius);
      background-color: #FBFAF9;
      font-family: 'Inter', sans-serif;
      font-size: 1rem;
      width: 100%;
      resize: vertical;
      min-height: 100px;
      outline: none;
    }
    
    .textarea:focus {
      outline: 2px solid #764ba2;
    }

    /* Custom styles for Network Results */
    .network-results-box {
      color: white; 
      width: 100%; 
      text-align: left; 
      background: rgba(0,0,0,0.2); 
      padding: 15px 20px; 
      border-radius: 8px; 
      display: none;
      margin-bottom: 15px;
      font-family: monospace;
      font-size: 1.1rem;
    }

    @media(max-width: 767px) {
      .home-thq-hero-title-elm { font-size: 2.5rem; letter-spacing: -1px; }
      .home-thq-hero-description-elm { font-size: 1.1rem; }
      .home-thq-geo-shape-elm1 { width: 150px; height: 150px; border-width: 20px; }
      .home-thq-geo-shape-elm2 { border-left: 60px solid transparent; border-right: 60px solid transparent; border-bottom: 100px solid rgba(255, 255, 255, 0.3); }
      .hero-btn { padding: 14px 32px; font-size: 1rem; }
    }
    @media(max-width: 479px) {
      .home-thq-hero-title-elm { font-size: 2rem; }
      .hero-btn { width: 100%; }
    }
  </style>
</head>
<body>

  <div class="home-container1">
    <section class="home-thq-hero-section-elm">
      
      <div class="home-thq-hero-geometric-elm">
        <div class="home-thq-geo-shape-elm1 geo-shape"></div>
        <div class="home-thq-geo-shape-elm2 geo-shape"></div>
        <div class="home-thq-geo-shape-elm3 geo-shape"></div>
      </div>

      <div class="home-thq-hero-content-elm">
        <h1 class="home-thq-hero-title-elm">Useful Stuff</h1>
        <p class="home-thq-hero-description-elm">
          Search the web safely, fix your grammar, and test your internet connection.
        </p>

        <div class="tools-grid">
          
          <div class="tool-box">
            <h2 class="tool-title">Kiddle Search</h2>
            <form class="tool-form" action="https://www.kiddle.co/s.php" method="GET" target="_blank">
              <input type="text" name="q" placeholder="Search the web safely..." class="thq-input" required>
              <button type="submit" class="hero-btn hero-btn-primary">Search</button>
            </form>
          </div>

          <div class="tool-box">
            <h2 class="tool-title">CorrectsX Grammar</h2>
            <div style="display: flex; flex-direction: column; align-items: center; width: 100%; gap: 15px;">
              <textarea id="grammar-input" class="textarea" placeholder="Paste your text here to check your grammar..."></textarea>
              
              <button id="check-grammar-btn" class="hero-btn hero-btn-secondary" style="width: 100%;">Check Grammar</button>
              
              <textarea id="grammar-output" class="textarea" placeholder="Your corrected text will appear here..." readonly style="background: rgba(255,255,255,0.8); color: #333; cursor: not-allowed;"></textarea>
            </div>
          </div>

          <div class="tool-box">
            <h2 class="tool-title">Network Tester</h2>
            <div style="display: flex; flex-direction: column; align-items: center; width: 100%;">
              
              <div id="network-results" class="network-results-box">
                <p style="margin-bottom: 8px;"><strong>IP Address:</strong> <span id="ip-result" style="color: #00f2fe;">...</span></p>
                <p style="margin-bottom: 8px;"><strong>Est. Download:</strong> <span id="speed-result" style="color: #00f2fe;">...</span></p>
                <p><strong>Status:</strong> <span id="network-status" style="color: #ff6b6b;">Waiting...</span></p>
              </div>

              <button id="run-network-btn" class="hero-btn hero-btn-primary" style="width: 100%;">Run Speed Test</button>
            </div>
          </div>

        </div>
        
        <div style="margin-top: 40px;">
           <a href="https://vminawebsite.github.io/" class="hero-btn hero-btn-secondary" style="background: transparent; border: 1px solid white; color: white; box-shadow: none;">← Back to Home</a>
        </div>

      </div>
    </section>
  </div>

  <script>
    // --- 1. Grammar Tool Logic ---
    document.getElementById('check-grammar-btn').addEventListener('click', function() {
      const input = document.getElementById('grammar-input').value;
      const output = document.getElementById('grammar-output');
      
      if (!input.trim()) {
        output.value = "Please enter some text first!";
        return;
      }
      
      output.value = "Checking...";
      
      // *Note:* Because a real grammar AI requires a backend server, 
      // this script provides a simulated "basic" correction for demonstration.
      // It capitalizes the first letter and ensures there is punctuation at the end.
      setTimeout(() => {
        let correctedText = input.charAt(0).toUpperCase() + input.slice(1);
        if (!/[.!?]$/.test(correctedText)) {
          correctedText += '.';
        }
        output.value = correctedText + "\n\n(Note: To check complex grammar, connect this output box to a real AI API!)";
      }, 800);
    });

    // --- 2. Network Tester Logic ---
    document.getElementById('run-network-btn').addEventListener('click', async function() {
      const resultsDiv = document.getElementById('network-results');
      const ipSpan = document.getElementById('ip-result');
      const speedSpan = document.getElementById('speed-result');
      const statusSpan = document.getElementById('network-status');

      // Show the results box and reset text
      resultsDiv.style.display = 'block';
      statusSpan.innerText = 'Fetching IP address...';
      ipSpan.innerText = '...';
      speedSpan.innerText = '...';

      try {
        // Step 1: Fetch IP Address using a free public API
        const ipResponse = await fetch('https://api.ipify.org?format=json');
        const ipData = await ipResponse.json();
        ipSpan.innerText = ipData.ip;

        // Step 2: Test Download Speed
        statusSpan.innerText = 'Testing download speed...';
        
        const startTime = new Date().getTime();
        const cacheBuster = '?nnn=' + startTime; 
        // We download a dummy image (~3.1 MB) from Wikimedia to test speed
        const downloadUrl = 'https://upload.wikimedia.org/wikipedia/commons/4/4e/Pleiades_large.jpg' + cacheBuster; 
        const downloadSizeBits = 3100000 * 8; // approx 3.1 MB converted to bits

        const img = new Image();
        
        img.onload = function() {
          const endTime = new Date().getTime();
          const durationInSeconds = (endTime - startTime) / 1000;
          const speedBps = downloadSizeBits / durationInSeconds;
          const speedMbps = (speedBps / 1024 / 1024).toFixed(2); // Convert to Megabits per second
          
          speedSpan.innerText = speedMbps + ' Mbps';
          statusSpan.innerText = 'Test Complete! ✅';
          statusSpan.style.color = '#4facfe';
        };
        
        img.onerror = function() {
          speedSpan.innerText = 'Error';
          statusSpan.innerText = 'Failed to download test file.';
        };
        
        img.src = downloadUrl; // Start the download

      } catch (err) {
        statusSpan.innerText = 'Network error occurred.';
      }
    });
  </script>
</body>
</html>
